name: Build & Release APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug

      - name: Prepare artifact
        run: |
          mkdir -p build-artifacts
          cp "app/build/outputs/apk/debug/app-debug.apk" "build-artifacts/ExecOS-${GITHUB_REF_NAME}-debug.apk"
          ls -lh build-artifacts

      - name: Create GitHub Release + upload APK
        uses: softprops/action-gh-release@v2
        with:
          name: "ExecOS ${GITHUB_REF_NAME}"
          files: |
            build-artifacts/ExecOS-${{ github.ref_name }}-debug.apk
